<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무룡고 시설 관리자 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 15px; background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        #login-section { max-width: 450px; margin: 80px auto; background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .security-warning { background-color: #fff3cd; border-left: 5px solid #dc3545; color: #856404; padding: 15px; border-radius: 5px; font-size: 0.85rem; text-align: left; line-height: 1.6; margin-bottom: 25px; }
        #admin-section { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 1200px; }
        .btn-sm { margin-right: 3px; }
        .pw-masked { font-family: monospace; letter-spacing: 2px; color: #6c757d; }
        .pw-revealed { font-family: monospace; letter-spacing: 1px; color: #dc3545; font-weight: bold; }
        .header-actions { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 8px; flex-wrap: wrap; }
        #qr-reader { width: 100%; border-radius: 10px; overflow: hidden; border: none !important; }
    </style>
</head>
<body>

    <div id="login-section">
        <h2 class="fw-bold mb-3">시설 관리자 시스템</h2>
        <div class="security-warning">
            <strong>[보안 경고]</strong><br>
            본 관리자 페이지는 무룡고등학교 전교학생회 임원 및 교직원 전용입니다. 허가되지 않은 접근을 엄격히 금하며, 비밀번호를 절대 타인에게 공유하거나 노출하지 마십시오.
        </div>
        <div class="mb-4">
            <input type="password" id="login-pw" class="form-control form-control-lg text-center" placeholder="비밀번호 또는 보안코드 입력">
        </div>
        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-primary w-50 fw-bold" onclick="attemptLogin('admin')">관리자 로그인</button>
            <button class="btn btn-dark w-50 fw-bold" onclick="attemptLogin('super')">운영 책임자 로그인</button>
        </div>
    </div>

    <div id="admin-section">
        <div class="header-actions">
            <button class="btn btn-success btn-sm fw-bold shadow-sm" onclick="openScannerModal()">학생 QR 스캔</button>
            <button id="specific-block-btn" class="btn btn-warning btn-sm fw-bold" style="display: none;" onclick="openBlockModal()">⏰ 부분 차단</button>
            <button id="block-btn" class="btn btn-danger btn-sm fw-bold" style="display: none;" onclick="toggleBookingBlock()">🛑 예약 전체 막기</button>
            <button id="super-admin-btn" class="btn btn-dark btn-sm fw-bold" style="display: none;" onclick="openSuperAdmin()">⚙️ 운영 책임자 설정</button>
            <button class="btn btn-outline-secondary btn-sm fw-bold" onclick="logout()">로그아웃</button>
        </div>

        <h2 class="text-center mb-4 mt-2">무룡고 시설 관리 보드</h2>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle" style="min-width: 800px;">
                <thead class="table-dark text-center">
                    <tr>
                        <th>이름(학번)</th>
                        <th>전화번호</th>
                        <th>시설명</th>
                        <th>목적</th>
                        <th>이용 시간</th>
                        <th>설정 비번</th>
                        <th>상태</th>
                        <th>관리 (승인/거절/문자)</th>
                    </tr>
                </thead>
                <tbody id="reserve-list" class="text-center"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="scannerModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-success text-white">
              <h5 class="modal-title fw-bold">학생 QR 패스 스캔</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="stopScanner()"></button>
            </div>
            <div class="modal-body text-center p-0 bg-dark">
                <div id="qr-reader"></div>
            </div>
            <div class="modal-footer justify-content-center">
              <button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal" onclick="stopScanner()">카메라 끄기</button>
            </div>
          </div>
        </div>
    </div>

    <div class="modal fade" id="blockModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title fw-bold text-dark">특정 시설 및 시간 차단</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="small text-muted mb-3">선택한 시설과 시간대에 학생들이 예약할 수 없도록 강제로 막습니다.</p>
            <label class="form-label fw-bold">차단할 시설</label>
            <select id="b_room" class="form-select mb-3">
                <option value="더하우스">더하우스</option><option value="풋살장">풋살장</option><option value="소회의실">소회의실</option>
            </select>
            <label class="form-label fw-bold">날짜 선택</label>
            <input type="date" id="b_date" class="form-control mb-3">
            <div class="row">
                <div class="col-6"><label class="form-label fw-bold">차단 시작</label><select id="b_start" class="form-select"></select></div>
                <div class="col-6"><label class="form-label fw-bold">차단 종료</label><select id="b_end" class="form-select"></select></div>
            </div>
            <label class="form-label fw-bold mt-3">차단 사유 (선택)</label>
            <input type="text" id="b_purpose" class="form-control" placeholder="예: 동아리 정기행사, 청소 등">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-danger fw-bold" onclick="submitSpecificBlock()">차단 등록</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        const SUPABASE_URL = 'https://uuimbwgcboqcavrouxtv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GR9xwY16SVWEbfc648iOUA_U9za_DaN';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentAdminPassword = ''; 
        let currentRole = ''; 
        let isBookingBlocked = false; 
        let blockModal;
        let scannerModal;
        let html5QrcodeScanner;

        async function loadSettings() {
            const { data } = await _supabase.from('site_settings').select('admin_password, is_booking_blocked').eq('id', 1).single();
            if (data) { currentAdminPassword = data.admin_password; isBookingBlocked = data.is_booking_blocked === true; updateBlockButtonUI(); } 
        }
        loadSettings(); 

        function openScannerModal() {
            scannerModal = new bootstrap.Modal(document.getElementById('scannerModal'));
            scannerModal.show();
            setTimeout(() => {
                html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }, 500);
        }

        function stopScanner() {
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); }
        }

        async function onScanSuccess(decodedText, decodedResult) {
            stopScanner(); 
            scannerModal.hide(); 
            
            const { data, error } = await _supabase.from('reservations').select('*').eq('id', decodedText).single();
            
            if (data) {
                const timeStr = `${formatTime(data.start_time)} ~ ${formatTime(data.end_time)}`;
                
                if(data.status === 'approved') {
                    const { error: updateErr } = await _supabase.from('reservations').update({ status: 'used' }).eq('id', decodedText);
                    if(!updateErr) {
                        alert(`[인증 성공]\n\n이름: ${data.student_name} (${data.student_id})\n장소: ${data.room_name}\n시간: ${timeStr}\n\n'사용 완료' 처리되었습니다.`);
                        load(); 
                    } else {
                        alert("오류 발생: " + updateErr.message);
                    }
                } else if(data.status === 'used') {
                    alert(`[재사용 불가]\n\n이미 인증이 완료되어 사용 처리된 QR코드입니다.`);
                } else if(data.status === 'pending' || data.status === 'standby') {
                    alert(`[미승인 예약]\n\n아직 관리자 승인이 완료되지 않은 예약입니다.`);
                } else {
                    alert(`[이용 불가]\n\n취소되거나 거절된 예약입니다.`);
                }
            } else {
                alert("시스템에 등록되지 않은 잘못된 QR코드입니다.");
            }
        }

        function onScanFailure(error) {}

        function updateBlockButtonUI() {
            const btn = document.getElementById('block-btn');
            if (!btn) return;
            if (isBookingBlocked) { btn.innerText = "🟢 예약 열기"; btn.classList.replace('btn-danger', 'btn-success'); } 
            else { btn.innerText = "🛑 예약 전체 막기"; btn.classList.replace('btn-success', 'btn-danger'); }
        }

        async function toggleBookingBlock() {
            const actionMsg = isBookingBlocked ? "예약을 다시 '활성화'하시겠습니까?" : "학생들의 예약을 임시로 '전체 차단'하시겠습니까?";
            if (!confirm(actionMsg)) return;
            const { error } = await _supabase.from('site_settings').update({ is_booking_blocked: !isBookingBlocked }).eq('id', 1);
            if (!error) { isBookingBlocked = !isBookingBlocked; updateBlockButtonUI(); alert(isBookingBlocked ? "전체 예약이 차단되었습니다." : "예약이 다시 열렸습니다."); }
        }

        function attemptLogin(role) {
            const inputPw = document.getElementById('login-pw').value;
            if (!inputPw) { alert("비밀번호를 입력해주세요."); return; }
            if (role === 'admin') {
                if (inputPw === currentAdminPassword) { loginSuccess('admin'); } else { alert("관리자 비밀번호가 일치하지 않습니다."); }
            } else if (role === 'super') {
                if (inputPw === 'mrhsfmo!') { loginSuccess('super'); } else { alert("운영 책임자 보안코드가 일치하지 않습니다."); }
            }
        }

        function loginSuccess(role) {
            currentRole = role; document.getElementById('login-pw').value = ''; 
            document.getElementById('login-section').style.display = 'none'; document.getElementById('admin-section').style.display = 'block';
            document.getElementById('specific-block-btn').style.display = 'inline-block';
            if (role === 'super') { document.getElementById('super-admin-btn').style.display = 'inline-block'; document.getElementById('block-btn').style.display = 'inline-block'; } 
            else { document.getElementById('super-admin-btn').style.display = 'none'; document.getElementById('block-btn').style.display = 'none'; }
            load(); 
        }

        function logout() { currentRole = ''; document.getElementById('admin-section').style.display = 'none'; document.getElementById('login-section').style.display = 'block'; }

        function formatTime(dateStr) {
            const d = new Date(dateStr);
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        function getStatusText(status) {
            if(status === 'pending') return '대기 중';
            if(status === 'approved') return '승인됨';
            if(status === 'standby') return '취소 대기';
            if(status === 'rejected') return '거절됨';
            if(status === 'cancelled') return '본인 취소';
            if(status === 'blocked') return '시스템 차단'; 
            if(status === 'used') return '사용 완료'; 
            return status;
        }

        // ✨ 새로운 문자 템플릿 적용 ✨
        function sendSMS(phone, room, startTime, endTime) {
            const d = new Date(startTime);
            const dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
            const timeStr = `${formatTime(startTime)} ~ ${formatTime(endTime)}`;
            
            const message = `[무룡고등학교 시설 예약 확정 안내]\n\n안녕하세요.\n무룡고등학교 시설 예약이 정상적으로 확정되었습니다.\n이용 전 학생회실로 방문하여 QR패스를 제출 및 키 수령하시기 바랍니다.\n\n이용 장소: ${room}\n이용 날짜: ${dateStr}\n이용 시간: ${timeStr}\n키박스 위치: 1층 보건실 옆 학생회실 입구\n※ 사용 후 반드시 키박스에 제출해 주시고, 키박스비밀번호는 예약 시 본인이 지정한 비밀번호이며, 무단 공유 시 이용이 제한될 수 있습니다.\n\n무룡고등학교 시설은 모든 학생이 함께 사용하는 공동 공간입니다. 아래 링크에 접속하여 반드시 확인 및 준수해 주시기 바랍니다.\nhttps://m.site.naver.com/21qLr\n\n📌 예약 취소를 원하실 경우\nhttps://m.site.naver.com/21qL8 접속 후 → 상단 오른쪽 [내 예약 취소하기]를 선택해 주시기 바랍니다.\n\n모두가 쾌적하고 안전하게 사용할 수 있도록 적극적인 협조를 부탁드립니다.`;
            
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const separator = isIOS ? '&' : '?';
            window.location.href = `sms:${phone}${separator}body=${encodeURIComponent(message)}`;
        }

        async function load() {
            const { data } = await _supabase.from('reservations').select('*').order('start_time', { ascending: false });
            const list = document.getElementById('reserve-list');
            list.innerHTML = '';
            
            data.forEach(res => {
                const timeString = `${formatTime(res.start_time)} ~ ${formatTime(res.end_time)}`;
                let actionButtons = '-';
                
                if (res.status === 'blocked') {
                    actionButtons = `<button onclick="unblockSpecificTime('${res.id}')" class="btn btn-sm btn-secondary w-100">차단 해제</button>`;
                } else if (res.status === 'pending' || res.status === 'standby') {
                    actionButtons = `<button onclick="updateStatus('${res.id}', 'approved')" class="btn btn-sm btn-success mb-1 w-100">승인</button><br><button onclick="updateStatus('${res.id}', 'rejected')" class="btn btn-sm btn-danger w-100">거절</button>`;
                } else if (res.status === 'approved') {
                    // ✨ 문자 보내기 버튼 (매개변수 수정) ✨
                    actionButtons = `<button onclick="sendSMS('${res.phone}', '${res.room_name}', '${res.start_time}', '${res.end_time}')" class="btn btn-sm btn-info w-100 fw-bold text-white shadow-sm">문자 전송</button>`;
                } else if (res.status === 'used') {
                    actionButtons = `<span class="text-primary fw-bold">인증 완료</span>`;
                }
                
                const pwCell = (res.status === 'blocked' || res.status === 'used') ? '-' : `<span id="pw-text-${res.id}" class="pw-masked">****</span><button id="pw-btn-${res.id}" class="btn btn-sm btn-outline-secondary ms-2" onclick="viewUserPw('${res.id}', '${res.password}')">보기</button>`;
                const priorityBadge = res.is_priority ? `<br><span class="badge bg-danger mt-1">⭐우선권</span>` : '';

                let studentInfo = `${res.student_name}<br>(${res.student_id})`;
                if (res.status === 'blocked') { studentInfo = `<span class="text-danger fw-bold">예약 제한</span>`; }

                const row = `<tr>
                    <td>${studentInfo}</td>
                    <td>${res.phone}</td>
                    <td class="fw-bold">${res.room_name}${priorityBadge}</td>
                    <td>${res.purpose || '-'}</td>
                    <td class="fw-bold" style="font-size:0.9rem;">${timeString}</td>
                    <td>${pwCell}</td>
                    <td><span class="${res.status === 'blocked' ? 'text-danger fw-bold' : (res.status === 'used' ? 'text-primary fw-bold' : '')}">${getStatusText(res.status)}</span></td>
                    <td>${actionButtons}</td>
                </tr>`;
                list.innerHTML += row;
            });
        }

        function viewUserPw(id, realPw) {
            const textSpan = document.getElementById(`pw-text-${id}`); textSpan.innerText = realPw || '(없음)';
            textSpan.className = 'pw-revealed'; document.getElementById(`pw-btn-${id}`).style.display = 'none'; 
        }

        async function updateStatus(id, newStatus) {
            const actionName = newStatus === 'approved' ? '승인' : '거절';
            if (!confirm(`정말 ${actionName}하시겠습니까?`)) return;
            const { error } = await _supabase.from('reservations').update({ status: newStatus }).eq('id', id);
            if (!error) { alert(`${actionName} 처리되었습니다.`); load(); } 
            else { alert('오류 발생: ' + error.message); }
        }

        function openBlockModal() {
            const startSelect = document.getElementById('b_start'); const endSelect = document.getElementById('b_end');
            if (startSelect.options.length === 0) {
                for (let i = 7; i <= 16; i++) {
                    let hour = i.toString().padStart(2, '0');
                    startSelect.add(new Option(`${hour}:00`, `${hour}:00`)); endSelect.add(new Option(`${hour}:00`, `${hour}:00`));
                    if (i !== 16) { startSelect.add(new Option(`${hour}:30`, `${hour}:30`)); endSelect.add(new Option(`${hour}:30`, `${hour}:30`)); }
                }
            }
            document.getElementById('b_date').value = ''; document.getElementById('b_purpose').value = '';
            blockModal = new bootstrap.Modal(document.getElementById('blockModal')); blockModal.show();
        }

        async function submitSpecificBlock() {
            const room = document.getElementById('b_room').value; const useDate = document.getElementById('b_date').value;
            const startTime = document.getElementById('b_start').value; const endTime = document.getElementById('b_end').value;
            const purpose = document.getElementById('b_purpose').value || '관리자 권한 차단';
            if (!useDate || !startTime || !endTime) { alert("날짜와 시간을 모두 선택해주세요."); return; }
            const start = new Date(`${useDate}T${startTime}`); const end = new Date(`${useDate}T${endTime}`);
            if (start >= end) { alert("종료 시간은 시작 시간보다 늦어야 합니다."); return; }

            const { error } = await _supabase.from('reservations').insert([{
                student_name: '관리자 차단', student_id: 9999, phone: '00000000000', purpose: purpose, password: 'admin',
                room_name: room, start_time: start.toISOString(), end_time: end.toISOString(), status: 'blocked', is_priority: false
            }]);
            if (!error) { alert("지정한 시설과 시간의 예약이 차단되었습니다."); blockModal.hide(); load(); } 
            else { alert("오류 발생: " + error.message); }
        }

        async function unblockSpecificTime(id) {
            if(!confirm("차단을 해제하시겠습니까?")) return;
            const { error } = await _supabase.from('reservations').delete().eq('id', id);
            if(!error) { alert("차단이 해제되었습니다."); load(); } else { alert("오류 발생: " + error.message); }
        }

        async function openSuperAdmin() {
            const action = prompt(`[운영 책임자 전용 메뉴]\n원하시는 작업을 숫자로 입력하세요.\n\n1. 관리자 비밀번호 변경\n2. 예약 명단 전체 초기화`);
            if (action === '1') {
                const newPw = prompt(`새롭게 변경할 비밀번호를 입력하세요.`);
                if (newPw) {
                    const { error } = await _supabase.from('site_settings').update({ admin_password: newPw }).eq('id', 1);
                    if (!error) { currentAdminPassword = newPw; alert(`관리자 비밀번호가 변경되었습니다.`); }
                }
            } else if (action === '2') {
                if (confirm("⚠️ 전체 초기화를 진행하시겠습니까?")) {
                    if (prompt("진행하려면 '초기화진행' 이라고 입력해주세요.") === '초기화진행') {
                        const { error } = await _supabase.from('reservations').delete().neq('id', 0);
                        if (!error) { alert("예약 명단이 완벽하게 초기화되었습니다."); load(); } 
                    }
                }
